name: Build And Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark this release as pre-release"
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt "pyinstaller>=6.0"

      - name: Build binary with PyInstaller
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess
          import sys

          sep = ';' if os.name == 'nt' else ':'
          cmd = [
              sys.executable,
              '-m',
              'PyInstaller',
              '--noconfirm',
              '--clean',
              '--onefile',
              '--name',
              'tg-codex',
              '--hidden-import',
              'uvicorn.lifespan.on',
              '--hidden-import',
              'uvicorn.lifespan.off',
              '--hidden-import',
              'uvicorn.protocols.http.auto',
              '--hidden-import',
              'uvicorn.protocols.websockets.auto',
              '--hidden-import',
              'uvicorn.loops.asyncio',
              '--hidden-import',
              'uvicorn.loops.auto',
              '--add-data',
              f'.env.example{sep}.',
              'cli.py',
          ]
          print('Running:', ' '.join(cmd))
          subprocess.check_call(cmd)
          PY

      - name: Package release archive
        shell: bash
        run: |
          python - <<'PY'
          import os
          import platform
          import tarfile
          import zipfile
          from pathlib import Path

          dist_dir = Path('dist')
          binary = dist_dir / ('tg-codex.exe' if os.name == 'nt' else 'tg-codex')
          if not binary.exists():
              raise FileNotFoundError(binary)

          system_map = {
              'Linux': 'linux',
              'Darwin': 'macos',
              'Windows': 'windows',
          }
          arch_map = {
              'x86_64': 'x64',
              'amd64': 'x64',
              'arm64': 'arm64',
              'aarch64': 'arm64',
          }

          system = system_map.get(platform.system(), platform.system().lower())
          arch = arch_map.get(platform.machine().lower(), platform.machine().lower())
          asset_base = f'tg-codex-{system}-{arch}'

          release_dir = Path('release-assets')
          release_dir.mkdir(parents=True, exist_ok=True)

          if os.name == 'nt':
              archive = release_dir / f'{asset_base}.zip'
              with zipfile.ZipFile(archive, 'w', zipfile.ZIP_DEFLATED) as zf:
                  zf.write(binary, arcname='tg-codex.exe')
                  zf.write('README.md', arcname='README.md')
                  zf.write('.env.example', arcname='.env.example')
          else:
              archive = release_dir / f'{asset_base}.tar.gz'
              with tarfile.open(archive, 'w:gz') as tf:
                  tf.add(binary, arcname='tg-codex')
                  tf.add('README.md', arcname='README.md')
                  tf.add('.env.example', arcname='.env.example')

          print(f'Created archive: {archive}')
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
